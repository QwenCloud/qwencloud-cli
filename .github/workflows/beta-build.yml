name: Beta Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Job 1: Lint & Test ─────────────────────────────────────────────────────
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

  # ── Job 2: Cross-compile for 6 platforms ───────────────────────────────────
  build:
    name: Build
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Shim react-devtools-core
        run: |
          mkdir -p node_modules/react-devtools-core
          echo '{"name":"react-devtools-core","version":"0.0.0","main":"index.js","type":"module"}' > node_modules/react-devtools-core/package.json
          echo 'export default {};' > node_modules/react-devtools-core/index.js

      - name: Build binaries
        run: |
          mkdir -p dist/release

          targets=(
            "bun-linux-x64"
            "bun-linux-arm64"
            "bun-darwin-x64"
            "bun-darwin-arm64"
            "bun-windows-x64"
            "bun-windows-arm64"
          )

          for target in "${targets[@]}"; do
            platform=$(echo "$target" | cut -d'-' -f2)
            arch=$(echo "$target" | cut -d'-' -f3)
            dir="dist/stage/${platform}-${arch}"
            mkdir -p "$dir"

            if [ "$platform" = "windows" ]; then
              binname="qwencloud.exe"
            else
              binname="qwencloud"
            fi

            echo "::group::Building $target -> $binname"
            bun build bin/qwencloud.ts --compile --target="$target" --outfile "$dir/$binname"
            echo "::endgroup::"
          done

      - name: Zip artifacts
        run: |
          for dir in dist/stage/*/; do
            label=$(basename "$dir")
            zipname="qwencloud-${label}.zip"
            echo "Zipping $dir -> dist/release/$zipname"
            (cd "$dir" && zip "../../release/$zipname" *)
          done
          rm -rf dist/stage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beta-build-${{ github.sha }}
          path: dist/release/*.zip
          retention-days: 1
